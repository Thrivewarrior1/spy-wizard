name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint for undefined names (F821)
        # A NameError on a line that only runs at the END of a long scrape is
        # invisible to unit tests and to the import smoke-test below: it needs
        # a full live scrape to reach. This exact bug (len(stores) where only
        # store_ids exists) silently made every scrape report 0 products.
        # Static analysis catches it in seconds; a live run costs 40 minutes.
        run: ruff check --select F821 --output-format=concise .

      - name: Run tests
        env:
          # Force the in-memory test path; never touch a real DB.
          DATABASE_URL: "sqlite:///:memory:"
        run: pytest -v

      - name: Smoke-import main.py + boot lifespan
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          # Catches the failure class where main.py parses fine in unit
          # tests but the FastAPI lifespan startup blows up (missing
          # import, lifespan-only code path, dialect mismatch, etc.).
          # Without this step the failure surfaces only on Railway as a
          # silent stuck deploy. Now it fails CI before merge.
          python -c "
          import sys, asyncio
          sys.path.insert(0, '.')
          import main
          async def boot():
              from contextlib import AsyncExitStack
              async with AsyncExitStack() as stack:
                  await stack.enter_async_context(main.lifespan(main.app))
                  print('LIFESPAN BOOTED OK')
          asyncio.run(boot())
          "
